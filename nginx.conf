server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Unity WebGL .unityweb files (gzip-compressed by Unity)
    location ~ \.framework\.js\.unityweb$ {
        add_header Content-Encoding gzip;
        types { application/javascript js; }
    }
    location ~ \.wasm\.unityweb$ {
        add_header Content-Encoding gzip;
        types { application/wasm wasm; }
    }
    location ~ \.data\.unityweb$ {
        add_header Content-Encoding gzip;
        default_type application/octet-stream;
    }

    # Unity WebGL .gz compressed files
    location ~ \.js\.gz$ {
        add_header Content-Encoding gzip;
        types { application/javascript js; }
    }
    location ~ \.wasm\.gz$ {
        add_header Content-Encoding gzip;
        types { application/wasm wasm; }
    }
    location ~ \.data\.gz$ {
        add_header Content-Encoding gzip;
        default_type application/octet-stream;
    }

    # Brotli compressed files
    location ~ \.js\.br$ {
        add_header Content-Encoding br;
        types { application/javascript js; }
    }
    location ~ \.wasm\.br$ {
        add_header Content-Encoding br;
        types { application/wasm wasm; }
    }
    location ~ \.data\.br$ {
        add_header Content-Encoding br;
        default_type application/octet-stream;
    }

    # WASM MIME type
    location ~ \.wasm$ {
        types { application/wasm wasm; }
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
